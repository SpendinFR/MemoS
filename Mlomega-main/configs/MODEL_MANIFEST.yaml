# MLOmega V19 model manifest.
#
# Weights live under models/ (git-ignored). Fetch + verify with:
#   python scripts/fetch_models_v19.py
# Each fetchable entry carries url + sha256 + license so the download is
# reproducible and auditable (handoff §4.1 / E27 ADR).
models:
  live_llm:
    provider: ollama
    default: qwen3.5:4b
    license: model-card-required
    max_vram_mb: 3072
  deep_llm:
    provider: ollama
    default: qwen3.5:9b
    license: model-card-required
    phase: nocturne
  vlm:
    provider: ollama
    # Targeted VLM crop, one job at a time (handoff §3.6 / §4.1). Pulled via
    # `ollama pull`, not this fetch script. Env override: MLOMEGA_VLM_MODEL.
    default: moondream
    license: model-card-required
    max_vram_mb: 5632

  # --- Fetchable ONNX / CTranslate2 weights (scripts/fetch_models_v19.py) ---
  detector:
    provider: onnx_local
    default: yolox_nano.onnx
    # Megvii YOLOX-Nano, official ONNX release asset. Apache-2.0 (permissive):
    # chosen over an Ultralytics-exported YOLO-nano to avoid the AGPL-3.0 weight
    # taint that an ultralytics export carries (ADR §E27).
    license: Apache-2.0
    path: models/yolox_nano.onnx
    url: https://github.com/Megvii-BaseDetection/YOLOX/releases/download/0.1.1rc0/yolox_nano.onnx
    sha256: c789161ed43c8269fcd4e67c67eeeb4e80c622da2eb296a20bc6007bd18a0b7d
    input_size: 416
    max_vram_mb: 512

  asr:
    provider: faster_whisper
    # faster-whisper `small`, int8, GPU if CUDA present else CPU. Downloaded on
    # first use into the HuggingFace cache by faster-whisper itself (CTranslate2
    # conversion of openai/whisper-small). MIT (faster-whisper) / Whisper weights.
    default: small
    compute_type: int8
    license: MIT
    max_vram_mb: 1024

  face_detector:
    provider: onnx_local
    # OpenCV Zoo YuNet (FaceDetectorYN). Tiny (~230 KB) ONNX face detector run
    # through cv2.FaceDetectorYN — CPU-friendly, GPU optional. MIT license
    # (permissive, no copyleft taint). Used by services/live-pc/face_identity.py
    # to crop+align faces before the SFace embedder (ADR §E32).
    license: MIT
    path: models/face_detection_yunet_2023mar.onnx
    url: https://github.com/opencv/opencv_zoo/raw/main/models/face_detection_yunet/face_detection_yunet_2023mar.onnx
    sha256: 8f2383e4dd3cfbb4553ea8718107fc0423210dc964f9f4280604804ed2552fa4
    max_vram_mb: 64

  face_embedder:
    provider: onnx_local
    # OpenCV Zoo SFace (FaceRecognizerSF), a MobileFaceNet trained with the SFace
    # loss. Run through cv2.FaceRecognizerSF -> 128-D L2 embedding, matched by
    # cosine against the local face gallery. Apache-2.0 (permissive). CPU is
    # sufficient (tiny model); GpuArbiter "ocr"-class job used when a GPU is free.
    license: Apache-2.0
    path: models/face_recognition_sface_2021dec.onnx
    url: https://github.com/opencv/opencv_zoo/raw/main/models/face_recognition_sface/face_recognition_sface_2021dec.onnx
    sha256: 0ba9fbfa01b5270c96627c4ef784da859931e02f04419c829e83484087c34e79
    embedding_dim: 128
    max_vram_mb: 128

  translate:
    provider: argos_translate
    # Argos Translate (CTranslate2, MIT). Offline NMT, no LLM. Language packs
    # installed via `argostranslate.package` into the Argos data dir on first use
    # (fetch_models_v19.py --argos installs en<->fr). zh->fr installed if a pack
    # is available in the index.
    license: MIT
    pairs: [en-fr, fr-en]

  # --- Local TTS voices (sherpa-onnx OfflineTts, E35) ----------------------
  # Piper/VITS voices from the sherpa-onnx TTS model zoo. Distributed as
  # .tar.bz2 archives (model.onnx + tokens.txt + espeak-ng-data). The Piper
  # voices are released under the MIT license (Piper); the bundled espeak-ng
  # data is GPL-3.0 (kept as runtime data, never linked into our code). Chosen
  # from the two authoritative sources consulted (ADR §E35):
  #   1. sherpa-onnx TTS model releases (k2-fsa) — the canonical index of vetted
  #      offline voices, each with a direct archive URL;
  #   2. the Piper voices catalogue (rhasspy) — voice quality + per-voice license.
  # ``archive`` is fetched + sha256-verified then extracted so ``path`` exists.
  # sha256 is pinned on first successful fetch (fetch_models_v19.py records it).
  tts_fr:
    provider: sherpa_onnx
    # French voice (Piper/VITS siwis, MIT). Extract yields the .onnx + tokens.
    license: MIT
    path: models/vits-piper-fr_FR-siwis-medium/fr_FR-siwis-medium.onnx
    archive: https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-fr_FR-siwis-medium.tar.bz2
    archive_sha256: PENDING_FETCH
    extract_to: models
    max_vram_mb: 128

  tts_en:
    provider: sherpa_onnx
    # English voice (Piper/VITS amy, MIT). Extract yields the .onnx + tokens.
    license: MIT
    path: models/vits-piper-en_US-amy-low/en_US-amy-low.onnx
    archive: https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-en_US-amy-low.tar.bz2
    archive_sha256: PENDING_FETCH
    extract_to: models
    max_vram_mb: 128
# --- Android device-local models (E47-C) ---------------------------------
# Weights the phone runs ON DEVICE when the PC is absent (offline ASR/KWS +
# gesture recognition). They are NOT shipped in the APK (size); the phone fetches
# them from the PC at first launch through the SessionHub provisioning endpoints
# (GET /models/device/manifest, GET /models/device/{name}) — sha256-verified,
# stored in the app's private files dir (E47-C livrable 2 / guide E47 §2).
#
# Each entry lives under models/device/ (git-ignored, fetched by
# scripts/fetch_models_v19.py --device). sha256 is pinned on first successful
# fetch (the PENDING_FETCH pattern already used for the E35 TTS archives), so the
# provisioning endpoint always serves a hash-matched artefact. Licences below are
# the upstream licences of the two authoritative sources (max-3-web-check ADR
# §E47C): k2-fsa/sherpa-onnx model releases and Google's MediaPipe model bucket.
device:
  # --- Streaming ASR (sherpa-onnx online zipformer transducer) --------------
  # English streaming zipformer (LibriSpeech+GigaSpeech). Apache-2.0 (k2-fsa).
  asr_stream_en:
    provider: sherpa_onnx_device
    platform: android
    kind: asr_streaming
    license: Apache-2.0
    path: models/device/sherpa-onnx-streaming-zipformer-en-2023-06-26
    archive: https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-streaming-zipformer-en-2023-06-26.tar.bz2
    archive_sha256: 639e25b578e9e997131402199419c13a941f8e4e198e2da1ce57dbf5cf401282
    extract_to: models/device
  # French streaming zipformer (Common Voice FR). Apache-2.0 (k2-fsa).
  asr_stream_fr:
    provider: sherpa_onnx_device
    platform: android
    kind: asr_streaming
    license: Apache-2.0
    path: models/device/sherpa-onnx-streaming-zipformer-fr-2023-04-14
    archive: https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-streaming-zipformer-fr-2023-04-14.tar.bz2
    archive_sha256: 77d4cbd61dcfa55fd2c14efc0ce5c6798be5931c05f35df5bab60c921950bb8c
    extract_to: models/device
  # --- Wake word / keyword spotting (sherpa-onnx KWS zipformer) --------------
  # English KWS (GigaSpeech). Apache-2.0 (k2-fsa). Gates intent routing (E47 §4).
  kws_en:
    provider: sherpa_onnx_device
    platform: android
    kind: keyword_spotting
    license: Apache-2.0
    path: models/device/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01
    archive: https://github.com/k2-fsa/sherpa-onnx/releases/download/kws-models/sherpa-onnx-kws-zipformer-gigaspeech-3.3M-2024-01-01.tar.bz2
    archive_sha256: f170013b4716e41b62b9bfd809687c207cef798ef9bc6534d524e17af9b6561a
    extract_to: models/device
  # --- MediaPipe hand tracking + gesture (tasks-vision, LIVE_STREAM) --------
  # hand_landmarker.task bundle. Apache-2.0 (Google MediaPipe). Feeds the E47 §3
  # GesturePipeline (palm/swipe/pinch → MenuGestureController).
  hand_landmarker:
    provider: mediapipe_device
    platform: android
    kind: hand_landmarker
    license: Apache-2.0
    path: models/device/hand_landmarker.task
    url: https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/latest/hand_landmarker.task
    sha256: fbc2a30080c3c557093b5ddfc334698132eb341044ccee322ccf8bcf3607cde1
  # gesture_recognizer.task bundle (embeds a hand_landmarker + gesture head).
  # Apache-2.0 (Google MediaPipe).
  gesture_recognizer:
    provider: mediapipe_device
    platform: android
    kind: gesture_recognizer
    license: Apache-2.0
    path: models/device/gesture_recognizer.task
    url: https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/latest/gesture_recognizer.task
    sha256: 97952348cf6a6a4915c2ea1496b4b37ebabc50cbbf80571435643c455f2b0482
  # --- Voice activity detection (Silero VAD) ---------------------------------
  # Required by AsrKwsService to gate the on-device ASR/KWS stream (gap found
  # at E48-A: missing from device provisioning). MIT (snakers4/silero-vad),
  # file hosted by k2-fsa/sherpa-onnx releases.
  silero_vad:
    provider: sherpa_onnx_device
    platform: android
    kind: vad
    license: MIT
    path: models/device/silero_vad.onnx
    url: https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/silero_vad.onnx
    sha256: 9e2449e1087496d8d4caba907f23e0bd3f78d91fa552479bb9c23ac09cbb1fd6

  # --- Live translation (E48-A) — offline NMT reflex, ONNX Runtime + OPUS-MT ---
  # The phone translates its own final ASR segments FR<->EN on device (PC absent),
  # so the subtitle line carries a translation under the original. Engine (ADR
  # §E48-A): ONNX Runtime + Helsinki-NLP OPUS-MT (MarianMT), the int8 encoder +
  # merged-decoder exports from Xenova (Apache-2.0), driven by a pure-Kotlin
  # Unigram (Marian) tokenizer over the export's tokenizer.json (no SentencePiece
  # JNI). Each direction is THREE single-file entries (encoder / merged decoder /
  # tokenizer) so they reuse the existing single-file fetch + provisioning path
  # unchanged; ``target_subdir`` reproduces one dir per direction on device
  # (models/device/opus-mt-fr-en, .../opus-mt-en-fr). sha256 pinned on first fetch
  # (same PENDING_FETCH pattern as the sherpa/TTS entries). ~108 MB/direction,
  # downloaded once over LAN like the ASR streaming models — not shipped in the APK.
  translate_fr_en_encoder:
    provider: onnx_translate_device
    platform: android
    kind: translation
    direction: fr-en
    role: encoder
    license: Apache-2.0
    path: models/device/opus-mt-fr-en/encoder_model_int8.onnx
    target_subdir: opus-mt-fr-en
    url: https://huggingface.co/Xenova/opus-mt-fr-en/resolve/main/onnx/encoder_model_int8.onnx
    sha256: efdbaf8dd1dd32b8c08c9492837783b7e13fce2c37d00a4330cf23d76b9416c4
  translate_fr_en_decoder:
    provider: onnx_translate_device
    platform: android
    kind: translation
    direction: fr-en
    role: decoder
    license: Apache-2.0
    path: models/device/opus-mt-fr-en/decoder_model_merged_int8.onnx
    target_subdir: opus-mt-fr-en
    url: https://huggingface.co/Xenova/opus-mt-fr-en/resolve/main/onnx/decoder_model_merged_int8.onnx
    sha256: aae1cb516ce394943b589d297bb9b2c541e67cebd3fb34657fa8c0325123ef61
  translate_fr_en_tokenizer:
    provider: onnx_translate_device
    platform: android
    kind: translation
    direction: fr-en
    role: tokenizer
    license: Apache-2.0
    path: models/device/opus-mt-fr-en/tokenizer.json
    target_subdir: opus-mt-fr-en
    url: https://huggingface.co/Xenova/opus-mt-fr-en/resolve/main/tokenizer.json
    sha256: 8391785c1a2139e7af4678571ccd8dc654ecbb72e4be186940f65d7c604f0246
  translate_en_fr_encoder:
    provider: onnx_translate_device
    platform: android
    kind: translation
    direction: en-fr
    role: encoder
    license: Apache-2.0
    path: models/device/opus-mt-en-fr/encoder_model_int8.onnx
    target_subdir: opus-mt-en-fr
    url: https://huggingface.co/Xenova/opus-mt-en-fr/resolve/main/onnx/encoder_model_int8.onnx
    sha256: 2388a07757358d877d4ba258ce55e0ff58082e7c8598589cffcb1a31a7e2fbf3
  translate_en_fr_decoder:
    provider: onnx_translate_device
    platform: android
    kind: translation
    direction: en-fr
    role: decoder
    license: Apache-2.0
    path: models/device/opus-mt-en-fr/decoder_model_merged_int8.onnx
    target_subdir: opus-mt-en-fr
    url: https://huggingface.co/Xenova/opus-mt-en-fr/resolve/main/onnx/decoder_model_merged_int8.onnx
    sha256: c3eef411baa5d59a2faf3997e20f0d1beac065586741718873c1164e0ac1b852
  translate_en_fr_tokenizer:
    provider: onnx_translate_device
    platform: android
    kind: translation
    direction: en-fr
    role: tokenizer
    license: Apache-2.0
    path: models/device/opus-mt-en-fr/tokenizer.json
    target_subdir: opus-mt-en-fr
    url: https://huggingface.co/Xenova/opus-mt-en-fr/resolve/main/tokenizer.json
    sha256: 8391785c1a2139e7af4678571ccd8dc654ecbb72e4be186940f65d7c604f0246

