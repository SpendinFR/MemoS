video:
  ingress_port: 8704
  datachannel_port: 8706
  target_resolution: 720p
  target_fps: 30
vision:
  # Adaptive detector cadence (handoff §3.6). Bounds only — the live cadence is
  # driven by an inter-frame motion score + focus demand, never hard-coded.
  detector_fps_min: 5
  detector_fps_max: 15
  queue_size: 1
  # Motion score (mean abs inter-frame luma delta, 0..1) at/above which the
  # detector runs at fps_max; at/below motion_low it floors to fps_min.
  motion_high: 0.06
  motion_low: 0.015
  # Keyframe selection: scene-change score above this records a keyframe
  # (histogram distance + motion), with a min spacing so a moving scene emits at
  # most ~1 keyframe / keyframe_min_interval_s.
  keyframe_change_threshold: 0.35
  keyframe_min_interval_s: 3.0
  detector:
    model_path: models/yolox_nano.onnx
    input_size: 416
    score_threshold: 0.30
    nms_threshold: 0.45
  ocr:
    max_roi_px: 640          # OCR ROI/crop cap; never full-screen (handoff §3.6)
  vlm:
    model_env: MLOMEGA_VLM_MODEL
    default_model: moondream
    timeout_s: 8.0           # short timeout; degrade honestly if Ollama absent
    max_crop_px: 512
audio:
  target_sample_rate: 16000
  vad:
    aggressiveness: 2        # webrtcvad 0..3
    frame_ms: 30
    min_speech_ms: 200
    max_silence_ms: 400
  asr:
    model: small
    compute_type: int8       # GPU if CUDA present, else CPU
    target_language: fr      # subtitles translated into this language
# E54: media retention & disk budget. The retention module
# (services/live-pc/media_retention.py) and DOCTOR -Quota read this block; any
# missing key falls back to a coded default. Decision (user, 2026-07-08): keep
# everything, 100 GB budget, replay clips/audio at any time.
storage_quota:
  total_gb: 100          # global media budget; over this, evict oldest UNREFERENCED first
  warn_gb: 80            # DOCTOR/retention WARN threshold before the hard budget
  fail_gb: 95            # DOCTOR total-footprint FAIL threshold
  retention_days: 90     # unreferenced media older than this become purge-eligible
  transcode_audio: true  # post-close-day WAV -> Opus (~/10), reversible (keeps sha)
  day_buffer_warn_gb: 2  # day-buffer size WARN (purged at close-day)
  day_buffer_fail_gb: 5  # day-buffer size FAIL
# E55: live clip recording + tiering. The recorder
# (services/live-pc/clip_recorder.py) reads this block; any missing key falls
# back to a coded default. CPU libx264 (GPU stays 100% for vision/LLM), bounded
# queue drop-on-full + low-priority ffmpeg process → NEVER slows the live path.
# Clips index into visual_evidence_assets_v19 (asset_kind='clip'); E54 owns the
# disk budget/eviction. Bench (2026-07-08): 540p/12fps veryfast ~= 1.8% of one
# core, zero GPU. GO confirmed.
clip_recording:
  enabled: true
  segment_seconds: 120      # rotate a new MP4 every N seconds (clips 1-5 min)
  target_fps: 12            # encode cadence (downsample from the 30fps live feed)
  height: 540               # output height; width derived from the frame aspect
  bitrate_kbps: 1000        # libx264 target bitrate (~1 Mbps)
  queue_max_frames: 60      # bounded encode queue; full => DROP frame (never block live)
  drop_pause_threshold: 120 # drops within the window => auto-pause recording
  keep_boring_days: 2       # close-day: boring+unreferenced clips younger than this are dropped to keyframes-only
# E53: "Viki mode aide" universal help mode. The HelpTaskEngine
# (services/live-pc/help_mode.py) reads this block; any missing key falls back to
# a coded default. The plan/hint reuse the E33 LLM router (paid mode + cost). The
# no-progress watchdog is event-driven; a cloud visual hint fires only on the 2nd
# timeout AND only when paid mode is active AND allow_cloud_hints (never per frame).
help_mode:
  no_progress_seconds: 90     # per-step "no progress" timer before a proactive hint
  allow_cloud_hints: true     # 2nd timeout may call cloud for a keyframe hint IF paid mode active
gpu:
  max_live_vram_ratio: 0.90
  degrade_order: [detector_floor, pause_changes, refuse_vlm]
  job_budgets_mb:
    tracker: 512
    detector: 512
    asr: 1024                # faster-whisper small int8 ~1 Go (dedicated ASR class)
    ocr: 768
    live_llm: 3072
    vlm: 5632
    deep: 8192
